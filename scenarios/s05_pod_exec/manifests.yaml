apiVersion: v1
kind: ServiceAccount
metadata:
  name: exec-sa
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-exec
  namespace: dev
rules:
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-exec
  namespace: dev
subjects:
  - kind: ServiceAccount
    name: exec-sa
    namespace: dev
roleRef:
  kind: Role
  name: pod-exec
  apiGroup: rbac.authorization.k8s.io