apiVersion: v1
kind: ServiceAccount
metadata:
  name: wildcard-sa
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: wildcard-all
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bind-wildcard
subjects:
  - kind: ServiceAccount
    name: wildcard-sa
    namespace: dev
roleRef:
  kind: ClusterRole
  name: wildcard-all
  apiGroup: rbac.authorization.k8s.io
