apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbac-admin
  namespace: dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: modify-rbac
  namespace: dev
rules:
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: bind-rbac
  namespace: dev
subjects:
  - kind: ServiceAccount
    name: rbac-admin
    namespace: dev
roleRef:
  kind: Role
  name: modify-rbac
  apiGroup: rbac.authorization.k8s.io